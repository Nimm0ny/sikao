<!doctype html>
<html lang="zh-CN" data-theme="paper">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>思考 — 错题本 & 笔记 (SIKAO 重设计)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --paper:#FAF7F0; --paper-2:#F4F0E6; --paper-3:#ECE6D7;
    --rule:#E2DBC8; --rule-strong:#C9C0A8;
    --ink:#1A1815; --ink-2:#3A352D; --ink-3:#6B6358; --ink-4:#948A7A;
    --accent:#9B2F2F; --accent-2:#7A2424; --accent-50:#F5E6E2;
    --ok:#4A6B3A; --ok-bg:#E7E9D9;
    --warn:#A66A18; --warn-bg:#F4E5C8;
    --err:#8B2F2F; --err-bg:#F1DCD7;
    --serif:'Source Serif 4','Noto Serif SC',Georgia,'Songti SC',serif;
    --sans:'Inter',system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
    --mono:'JetBrains Mono','SF Mono',ui-monospace,Consolas,monospace;
    --t-h1:44px; --t-h2:30px; --t-h3:22px; --t-h4:18px;
    --t-body:15px; --t-sm:13px; --t-cap:12px; --t-eyebrow:11px;
    --s1:4px; --s2:8px; --s3:12px; --s4:16px;
    --s5:24px; --s6:32px; --s7:48px; --s8:72px;
    --r-sm:4px; --r-md:6px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper-2);color:var(--ink);font-family:var(--sans);font-size:var(--t-body);line-height:1.55;-webkit-font-smoothing:antialiased;}
  em,i{font-style:normal;}
  b,strong{font-weight:600;}
  button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer;}
  svg{display:block;}
  .serif{font-family:var(--serif);letter-spacing:-.01em;}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}
  .eyebrow{font-family:var(--mono);font-size:var(--t-eyebrow);letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);}

  /* ==== buttons ==== */
  .btn{display:inline-flex;align-items:center;gap:var(--s2);height:36px;padding:0 var(--s4);border:1px solid transparent;border-radius:var(--r-sm);font-family:var(--mono);font-size:var(--t-cap);letter-spacing:.08em;text-transform:uppercase;font-weight:500;transition:all 120ms ease;white-space:nowrap;cursor:pointer;}
  .btn-primary{background:var(--ink);color:var(--paper);}
  .btn-primary:hover{background:#000;}
  .btn-secondary{border-color:var(--ink);color:var(--ink);background:var(--paper);}
  .btn-secondary:hover{background:var(--paper-2);}
  .btn-ghost{color:var(--ink-2);}
  .btn-ghost:hover{background:var(--paper-2);}
  .btn-accent{background:var(--accent);color:var(--paper);}
  .btn-accent:hover{background:var(--accent-2);}
  .btn-sm{height:28px;padding:0 12px;font-size:11px;}

  /* ==== stamp / mark ==== */
  .stamp{display:inline-flex;align-items:center;gap:var(--s2);font-family:var(--mono);font-size:var(--t-eyebrow);letter-spacing:.18em;text-transform:uppercase;color:var(--ink-2);}
  .stamp::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--accent);}

  /* ==== artboard frame ==== */
  .ab{background:var(--paper);border:1px solid var(--rule);position:relative;}

  /* ==== page header (within artboard) ==== */
  .ph{padding:40px 56px 28px;border-bottom:1px solid var(--rule);}
  .ph .eyebrow-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .ph h1{font-family:var(--serif);font-weight:600;font-size:var(--t-h1);line-height:1.05;letter-spacing:-.015em;margin:0;}
  .ph h1 .light{color:var(--ink-3);font-weight:400;font-style:italic;}
  .ph .ph-row{display:grid;grid-template-columns:1fr auto;gap:var(--s6);align-items:end;}
  .ph .lede{color:var(--ink-3);max-width:540px;margin:14px 0 0;font-size:var(--t-sm);line-height:1.6;}

  /* ==== stat strip ==== */
  .stat-strip{display:flex;background:var(--paper);border:1px solid var(--rule);}
  .stat-strip .cell{padding:14px 22px;border-left:1px solid var(--rule);min-width:114px;}
  .stat-strip .cell:first-child{border-left:0;}
  .stat-strip .k{font-family:var(--mono);font-size:var(--t-eyebrow);letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);}
  .stat-strip .v{font-family:var(--serif);font-weight:600;font-size:28px;line-height:1.1;color:var(--ink);margin-top:4px;}
  .stat-strip .v .small{font-family:var(--mono);font-weight:500;font-size:13px;color:var(--ink-3);margin-left:4px;}
  .stat-strip .accent .v{color:var(--accent);}

  /* ==== main grid ==== */
  .main{padding:32px 56px 64px;}

  /* ==== filters (reused style from main app) ==== */
  .filters{background:var(--paper);border:1px solid var(--rule);margin-bottom:24px;}
  .f-row{display:grid;grid-template-columns:96px 1fr;gap:var(--s4);padding:14px 24px;border-bottom:1px solid var(--rule);align-items:center;}
  .f-row:last-of-type{border-bottom:0;}
  .f-row .k{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);}
  .fchip{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 12px;border:1px solid transparent;border-radius:4px;font-size:13px;color:var(--ink-2);transition:all 120ms ease;cursor:pointer;}
  .fchip:hover{background:var(--paper-2);}
  .fchip.active{background:var(--ink);color:var(--paper);}
  .fchip .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);}
  .fchip .badge{font-family:var(--mono);font-size:10px;opacity:.55;margin-left:2px;}
  .f-chips{display:flex;flex-wrap:wrap;gap:6px;}
  .f-foot{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:var(--paper-2);border-top:1px solid var(--rule);}
  .f-sum{display:flex;flex-wrap:wrap;gap:10px;align-items:center;color:var(--ink-3);font-size:13px;}
  .sum-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--paper);border:1px solid var(--rule);font-family:var(--mono);font-size:11px;color:var(--ink-2);letter-spacing:.06em;}
  .sum-tag .x{color:var(--ink-4);cursor:pointer;}
  .match-num{font-family:var(--serif);font-weight:600;font-size:18px;color:var(--ink);margin-left:4px;}
  .reset{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);text-decoration:underline;cursor:pointer;}

  /* ============= 错题本 ============= */
  .wb-list{background:var(--paper);border:1px solid var(--rule);}
  .wb-row{display:grid;grid-template-columns:6px 56px 1fr 220px 200px 110px;gap:var(--s5);padding:22px 26px 22px 0;border-bottom:1px solid var(--rule);align-items:center;position:relative;transition:background 120ms ease;}
  .wb-row:last-child{border-bottom:0;}
  .wb-row:hover{background:var(--paper-2);}
  .wb-row .sev{align-self:stretch;background:var(--rule);}
  .wb-row[data-sev="high"] .sev{background:var(--accent);}
  .wb-row[data-sev="mid"]  .sev{background:var(--warn);}
  .wb-row[data-sev="low"]  .sev{background:var(--ink-4);}
  .wb-row[data-sev="ok"]   .sev{background:var(--ok);}
  .wb-num{font-family:var(--serif);font-weight:500;font-size:30px;color:var(--ink-4);line-height:1;text-align:center;}
  .wb-row:hover .wb-num{color:var(--ink);}
  .wb-body .src{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .wb-body .src .pill{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;border:1px solid var(--rule);padding:2px 6px;color:var(--ink-2);}
  .wb-body .src .from{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.04em;}
  .wb-body .q{font-family:var(--serif);font-size:16px;line-height:1.5;color:var(--ink);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
  .wb-body .tagrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .wb-body .lose{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;border:1px dashed var(--accent);color:var(--accent);}
  .wb-body .lose.ok{border:1px dashed var(--ok);color:var(--ok);}
  .wb-score .last{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;}
  .wb-score .num{font-family:var(--serif);font-weight:600;font-size:26px;color:var(--ink);line-height:1.1;margin-top:2px;}
  .wb-score .num.bad{color:var(--accent);}
  .wb-score .num .of{font-family:var(--mono);font-weight:500;font-size:12px;color:var(--ink-3);margin-left:2px;}
  .wb-score .when{font-family:var(--mono);font-size:10px;color:var(--ink-4);letter-spacing:.04em;margin-top:4px;}
  .wb-mast{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.06em;}
  .wb-mast .dots{display:inline-flex;gap:3px;vertical-align:middle;margin-right:6px;}
  .wb-mast .d{width:6px;height:6px;border:1px solid var(--rule-strong);border-radius:50%;}
  .wb-mast .d.on{background:var(--ink);border-color:var(--ink);}
  .wb-mast .ok-pill{display:inline-block;background:var(--ok-bg);color:var(--ok);font-size:10px;padding:3px 7px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;}
  .wb-act{display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
  .wb-act a{font-family:var(--mono);font-size:11px;color:var(--ink-2);letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .wb-act a:hover{color:var(--accent);}
  .wb-act a .arr{transition:transform 120ms ease;}
  .wb-act a:hover .arr{transform:translateX(2px);}

  /* === 错题本 hero (top resume) === */
  .wb-hero{background:var(--ink);color:var(--paper);padding:24px 28px;display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center;margin-bottom:24px;position:relative;overflow:hidden;}
  .wb-hero::after{content:"";position:absolute;right:-80px;top:-80px;width:300px;height:300px;background:radial-gradient(circle, rgba(155,47,47,.18) 0%, transparent 60%);pointer-events:none;}
  .wb-hero .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#a09a8c;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .wb-hero .kicker::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--accent);}
  .wb-hero h3{font-family:var(--serif);font-size:22px;font-weight:600;margin:0 0 6px;line-height:1.25;}
  .wb-hero .meta{font-family:var(--mono);font-size:11px;color:#a09a8c;letter-spacing:.06em;}
  .wb-hero .meta strong{color:#f3eedf;font-weight:500;}
  .wb-hero .act{display:flex;gap:10px;align-items:center;}
  .wb-hero .btn-rev{background:var(--paper);color:var(--ink);border:0;}
  .wb-hero .btn-rev:hover{background:#fff;}

  /* === overview chart bar === */
  .wb-overview{display:grid;grid-template-columns:1fr 320px;gap:24px;margin-bottom:24px;}
  .wb-chart{background:var(--paper);border:1px solid var(--rule);padding:20px 24px;}
  .wb-chart .ttl{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;}
  .wb-chart .ttl h4{font-family:var(--serif);font-size:16px;font-weight:600;margin:0;}
  .wb-chart .ttl .sub{font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase;}
  .wb-bars{display:flex;align-items:flex-end;gap:14px;height:120px;border-bottom:1px solid var(--rule);padding-bottom:8px;}
  .wb-bars .b{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;}
  .wb-bars .bar{width:100%;background:var(--ink);position:relative;}
  .wb-bars .bar .ok{position:absolute;bottom:0;left:0;right:0;background:var(--ok);}
  .wb-bars .bar .doing{position:absolute;bottom:0;left:0;right:0;background:var(--warn);}
  .wb-bars .lbl{font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.06em;}
  .wb-bars .val{font-family:var(--serif);font-weight:600;font-size:13px;color:var(--ink);}
  .wb-bars .b:hover .bar{filter:brightness(1.15);}
  .wb-legend{display:flex;gap:14px;margin-top:14px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--ink-3);}
  .wb-legend .sw{display:inline-flex;align-items:center;gap:5px;}
  .wb-legend .sw::before{content:"";width:9px;height:9px;}
  .wb-legend .sw.todo::before{background:var(--ink);}
  .wb-legend .sw.doing::before{background:var(--warn);}
  .wb-legend .sw.done::before{background:var(--ok);}

  /* === goal card === */
  .wb-goal{background:var(--paper);border:1px solid var(--rule);padding:20px 22px;display:flex;flex-direction:column;gap:14px;}
  .wb-goal h4{font-family:var(--serif);font-size:16px;font-weight:600;margin:0;display:flex;justify-content:space-between;align-items:baseline;}
  .wb-goal h4 .sub{font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase;font-weight:400;}
  .wb-goal .ring-row{display:flex;gap:18px;align-items:center;}
  .wb-goal .ring{width:84px;height:84px;position:relative;flex:none;}
  .wb-goal .ring svg{width:100%;height:100%;transform:rotate(-90deg);}
  .wb-goal .ring .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .wb-goal .ring .center .n{font-family:var(--serif);font-weight:600;font-size:22px;color:var(--ink);line-height:1;}
  .wb-goal .ring .center .of{font-family:var(--mono);font-size:10px;color:var(--ink-3);margin-top:2px;letter-spacing:.08em;}
  .wb-goal .legend{display:flex;flex-direction:column;gap:8px;flex:1;}
  .wb-goal .legend .li{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--ink-2);letter-spacing:.04em;}
  .wb-goal .legend .li b{color:var(--ink);font-weight:600;font-family:var(--serif);font-size:14px;}
  .wb-goal .cta{display:inline-flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--paper-2);border:1px solid var(--rule);font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);cursor:pointer;}
  .wb-goal .cta:hover{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  /* ============= 笔记 ============= */
  .nt-tabs{display:flex;gap:0;background:var(--paper);border:1px solid var(--rule);margin-bottom:24px;}
  .nt-tabs .tab{flex:1;padding:18px 22px;display:flex;flex-direction:column;gap:6px;border-right:1px solid var(--rule);cursor:pointer;transition:background 120ms ease;position:relative;}
  .nt-tabs .tab:last-child{border-right:0;}
  .nt-tabs .tab:hover{background:var(--paper-2);}
  .nt-tabs .tab.active{background:var(--ink);color:var(--paper);}
  .nt-tabs .tab .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);}
  .nt-tabs .tab.active .lbl{color:#a09a8c;}
  .nt-tabs .tab .ttl{font-family:var(--serif);font-size:18px;font-weight:600;display:flex;justify-content:space-between;align-items:baseline;}
  .nt-tabs .tab .ttl .n{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--ink-3);}
  .nt-tabs .tab.active .ttl .n{color:#a09a8c;}
  .nt-tabs .tab .desc{font-size:11px;color:var(--ink-3);}
  .nt-tabs .tab.active .desc{color:#a09a8c;}

  .nt-toolbar{display:grid;grid-template-columns:1fr auto auto;gap:14px;margin-bottom:20px;align-items:center;}
  .nt-search{display:flex;align-items:center;gap:10px;padding:0 14px;background:var(--paper);border:1px solid var(--rule);height:38px;}
  .nt-search input{flex:1;border:0;outline:0;background:transparent;font-family:var(--sans);font-size:14px;color:var(--ink);}
  .nt-search input::placeholder{color:var(--ink-4);}
  .nt-search .hk{font-family:var(--mono);font-size:10px;color:var(--ink-4);border:1px solid var(--rule);padding:2px 6px;letter-spacing:.06em;}
  .nt-tags{display:flex;flex-wrap:wrap;gap:6px;padding:14px 0 0;}
  .nt-tag{display:inline-flex;align-items:center;gap:4px;height:24px;padding:0 10px;background:var(--paper);border:1px solid var(--rule);font-family:var(--mono);font-size:11px;color:var(--ink-2);letter-spacing:.04em;cursor:pointer;}
  .nt-tag:hover{border-color:var(--ink);}
  .nt-tag.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .nt-tag .n{font-size:10px;opacity:.55;}
  .view-toggle{display:flex;border:1px solid var(--rule);background:var(--paper);height:38px;}
  .view-toggle button{padding:0 12px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);border-right:1px solid var(--rule);}
  .view-toggle button:last-child{border-right:0;}
  .view-toggle button.active{background:var(--ink);color:var(--paper);}

  /* === note cards === */
  .nt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:32px;}
  .ncard{background:var(--paper);border:1px solid var(--rule);padding:22px 22px 18px;position:relative;transition:all 120ms ease;cursor:pointer;display:flex;flex-direction:column;gap:14px;min-height:200px;}
  .ncard:hover{border-color:var(--ink);transform:translateY(-1px);}
  .ncard .ctype{position:absolute;top:0;left:0;width:3px;height:100%;background:var(--rule);}
  .ncard[data-type="quote"] .ctype{background:var(--accent);}
  .ncard[data-type="method"] .ctype{background:var(--ink);}
  .ncard[data-type="reflect"] .ctype{background:var(--warn);}
  .ncard[data-type="material"] .ctype{background:var(--ok);}
  .ncard .head{display:flex;justify-content:space-between;align-items:center;}
  .ncard .kind{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);display:flex;align-items:center;gap:6px;}
  .ncard .kind::before{content:"";width:6px;height:6px;}
  .ncard[data-type="quote"] .kind::before{background:var(--accent);}
  .ncard[data-type="method"] .kind::before{background:var(--ink);}
  .ncard[data-type="reflect"] .kind::before{background:var(--warn);}
  .ncard[data-type="material"] .kind::before{background:var(--ok);}
  .ncard .ago{font-family:var(--mono);font-size:10px;color:var(--ink-4);letter-spacing:.04em;}
  .ncard .qbody{font-family:var(--serif);font-size:17px;line-height:1.5;color:var(--ink);position:relative;padding-left:18px;}
  .ncard .qbody::before{content:"\201C";position:absolute;left:-4px;top:-6px;font-family:var(--serif);font-size:42px;line-height:1;color:var(--accent);font-weight:600;}
  .ncard .mbody{font-family:var(--serif);font-size:17px;line-height:1.4;color:var(--ink);font-weight:600;}
  .ncard .msteps{display:flex;flex-direction:column;gap:6px;}
  .ncard .msteps .st{display:grid;grid-template-columns:20px 1fr;gap:8px;font-size:12px;color:var(--ink-2);line-height:1.45;}
  .ncard .msteps .st .i{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--accent);}
  .ncard .rbody{font-family:var(--serif);font-size:15px;line-height:1.55;color:var(--ink-2);}
  .ncard .mat-line{display:grid;grid-template-columns:auto 1fr;gap:8px;font-size:13px;line-height:1.5;color:var(--ink-2);}
  .ncard .mat-line .key{font-family:var(--mono);font-size:11px;color:var(--ink-4);text-transform:uppercase;letter-spacing:.06em;padding-top:2px;}
