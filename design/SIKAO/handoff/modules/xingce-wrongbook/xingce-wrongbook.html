<!doctype html>
<html lang="zh-CN" data-theme="paper">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>思考 — 行测错题本 (SIKAO)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root{
  --paper:#FAF7F0;--paper-2:#F4F0E6;--paper-3:#ECE6D7;
  --rule:#E2DBC8;--rule-strong:#C9C0A8;
  --ink:#1A1815;--ink-2:#3A352D;--ink-3:#6B6358;--ink-4:#948A7A;
  --accent:#9B2F2F;--accent-2:#7A2424;--accent-50:#F5E6E2;
  --ok:#4A6B3A;--ok-bg:#E7E9D9;--warn:#A66A18;--warn-bg:#F4E5C8;--err:#8B2F2F;--err-bg:#F1DCD7;
  --serif:'Source Serif 4','Noto Serif SC',Georgia,serif;
  --sans:'Inter',system-ui,-apple-system,'PingFang SC',sans-serif;
  --mono:'JetBrains Mono','SF Mono',ui-monospace,monospace;
  --r-sm:4px;--r-md:6px;
  --data-0:#EEEAE0;--data-1:#D6E2EC;--data-2:#A8C2D4;--data-3:#6E94AC;--data-4:#3B5F7A;--data-5:#1E3445;
  --on-ink:#F3EEDF;--on-ink-2:#A09A8C;
}
@media (max-width:1280px){
  .ph,.main,.det-wrap,.psh{padding-left:32px;padding-right:32px;}
  .ph .pr{grid-template-columns:1fr;gap:18px;}
  .stat-strip{overflow-x:auto;}
  .ov{grid-template-columns:1fr;}
  .standout{grid-template-columns:1fr;}
  .hg{grid-template-columns:80px repeat(30,minmax(20px,1fr)) 60px;}
  .det-wrap,.psh{grid-template-columns:1fr;}
  .row{grid-template-columns:8px 48px 1fr 140px 130px 90px;gap:16px;}
  .sr-modes{grid-template-columns:repeat(2,1fr);}
  .split{grid-template-columns:1fr;height:auto;}
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--paper-2);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;}
b,strong{font-weight:600;}
button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer;}
svg{display:block;}
.serif{font-family:var(--serif);letter-spacing:-.01em;}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);}
.btn{display:inline-flex;align-items:center;gap:8px;height:36px;padding:0 16px;border:1px solid transparent;border-radius:4px;font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:500;transition:all 120ms ease;white-space:nowrap;cursor:pointer;}
.btn-primary{background:var(--ink);color:var(--paper);} .btn-primary:hover{background:#000;}
.btn-secondary{border-color:var(--ink);color:var(--ink);background:var(--paper);}
.btn-secondary:hover{background:var(--paper-2);}
.btn-ghost{color:var(--ink-2);} .btn-ghost:hover{background:var(--paper-2);}
.btn-accent{background:var(--accent);color:var(--paper);} .btn-accent:hover{background:var(--accent-2);}
.btn-sm{height:28px;padding:0 12px;font-size:11px;}
.stamp{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-2);}
.stamp::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--accent);}
.ab{background:var(--paper);border:1px solid var(--rule);position:relative;}

/* page header */
.ph{padding:40px 56px 28px;border-bottom:1px solid var(--rule);}
.ph .er{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.ph h1{font-family:var(--serif);font-weight:600;font-size:44px;line-height:1.05;letter-spacing:-.015em;margin:0;}
.ph h1 .light{color:var(--ink-3);font-weight:400;}
.ph .pr{display:grid;grid-template-columns:1fr auto;gap:32px;align-items:end;}
.ph .lede{color:var(--ink-3);max-width:560px;margin:14px 0 0;font-size:13px;line-height:1.6;}
.stat-strip{display:flex;background:var(--paper);border:1px solid var(--rule);}
.stat-strip .cell{padding:14px 22px;border-left:1px solid var(--rule);min-width:114px;}
.stat-strip .cell:first-child{border-left:0;}
.stat-strip .k{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);}
.stat-strip .v{font-family:var(--serif);font-weight:600;font-size:28px;line-height:1.1;color:var(--ink);margin-top:4px;}
.stat-strip .v .small{font-family:var(--mono);font-weight:500;font-size:13px;color:var(--ink-3);margin-left:4px;}
.stat-strip .accent .v{color:var(--ink);}
.main{padding:32px 56px 64px;}

/* hero band (continue) */
.hero{background:var(--ink);color:var(--paper);padding:22px 26px;display:grid;grid-template-columns:auto 1fr auto;gap:22px;align-items:center;margin-bottom:24px;position:relative;overflow:hidden;}
.hero::after{content:"";position:absolute;right:-80px;top:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(243,238,223,.06) 0,transparent 60%);pointer-events:none;}
.hero .seal{width:64px;height:64px;border:1px solid rgba(243,238,223,.22);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:30px;color:var(--on-ink);}
.hero .kick{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--on-ink-2);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.hero .kick::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--on-ink-2);}
.hero h3{font-family:var(--serif);font-size:22px;font-weight:600;margin:0 0 6px;}
.hero .m{font-family:var(--mono);font-size:11px;color:var(--on-ink-2);letter-spacing:.06em;}
.hero .m strong{color:var(--on-ink);font-weight:500;}
.hero .act{display:flex;gap:10px;}
.hero .btn-rev{background:var(--paper);color:var(--ink);border:0;}

/* overview row */
.ov{display:grid;grid-template-columns:1fr 320px;gap:24px;margin-bottom:24px;}
.heat{background:var(--paper);border:1px solid var(--rule);padding:20px 24px;}
.heat .th{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;}
.heat .th h4{font-family:var(--serif);font-size:16px;font-weight:600;margin:0;}
.heat .th .sub{font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase;}
.hg{display:grid;grid-template-columns:96px repeat(30,1fr) 70px;gap:2px;align-items:stretch;}
.hg .rl{font-family:var(--sans);font-size:12px;font-weight:500;color:var(--ink-2);padding:0 10px 0 0;display:flex;align-items:center;justify-content:space-between;height:18px;}
.hg .rl .rc{color:var(--ink-4);font-size:10px;font-family:var(--mono);font-weight:500;letter-spacing:.04em;}
.hg .cell{height:18px;background:var(--data-0);border:1px solid transparent;position:relative;cursor:pointer;transition:transform 100ms ease;}
.hg .cell:hover{outline:1px solid var(--accent);outline-offset:1px;transform:scale(1.5);z-index:3;}
.hg .cell[data-v="0"]{background:var(--data-0);}
.hg .cell[data-v="1"]{background:var(--data-1);}
.hg .cell[data-v="2"]{background:var(--data-2);}
.hg .cell[data-v="3"]{background:var(--data-3);}
.hg .cell[data-v="4"]{background:var(--data-4);}
.hg .cell[data-v="5"]{background:var(--data-5);}
.hg .cell.now{outline:1px solid var(--accent);outline-offset:0;z-index:2;}
.hg .cell.now::before{content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);width:0;height:0;border-left:3px solid transparent;border-right:3px solid transparent;border-bottom:4px solid var(--accent);}
.hg .cell.peak{box-shadow:inset 0 0 0 1.5px var(--ink);}
.hg .cell.peak::after{content:"";position:absolute;top:1px;right:1px;width:0;height:0;border-top:5px solid var(--ink);border-left:5px solid transparent;}
.hg .tot{display:flex;align-items:center;gap:6px;padding-left:8px;height:18px;font-family:var(--mono);font-size:10px;letter-spacing:.02em;}
.hg .tot .tb{flex:1;height:6px;background:var(--data-0);position:relative;}
.hg .tot .tb .tf{position:absolute;left:0;top:0;bottom:0;background:var(--data-5);}
.hg .tot .tn{min-width:18px;text-align:right;color:var(--ink);font-weight:600;}
.hg .ch{font-family:var(--mono);font-size:9px;color:var(--ink-4);text-align:center;letter-spacing:.02em;padding:4px 0 0;line-height:1.1;}
.hg .ch.week{color:var(--ink-2);font-weight:600;}
.hg .ch.totlbl{font-size:9px;color:var(--ink-3);text-align:left;padding-left:8px;}
.hg-peak{margin-top:16px;padding-top:12px;border-top:1px dashed var(--rule);display:flex;flex-wrap:wrap;gap:18px;font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.04em;}
.hg-peak .pk{display:inline-flex;align-items:center;gap:6px;cursor:pointer;}
.hg-peak .pk::before{content:"";width:5px;height:5px;background:var(--ink-2);}
.hg-peak .pk b{color:var(--ink);font-family:var(--serif);font-size:13px;font-weight:600;}
.hg-peak .pk:hover b{color:var(--ink-2);}
.hleg{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.06em;}
.hleg .sw{display:flex;gap:2px;}
.hleg .sw .s{width:14px;height:10px;}

/* standout row */
.standout{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.so{background:var(--paper);border:1px solid var(--rule);padding:20px 22px;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden;}
.so h4{font-family:var(--serif);font-size:16px;font-weight:600;margin:0;display:flex;justify-content:space-between;align-items:baseline;}
.so h4 .sub{font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase;font-weight:400;}
.so h4 .live{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase;font-weight:500;}
.so h4 .live::before{content:"";width:5px;height:5px;background:var(--ink-3);}


/* grad candidates */
.gradc{display:flex;flex-direction:column;gap:8px;}
.gradc .it{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:10px 12px;background:var(--paper-2);border:1px solid var(--rule);cursor:pointer;transition:all 120ms ease;}
.gradc .it:hover{background:var(--ok-bg);border-color:var(--ok);}
.gradc .pip{display:inline-flex;gap:3px;align-items:center;}
.gradc .pip .p{width:8px;height:8px;border:1px solid var(--rule-strong);border-radius:50%;}
.gradc .pip .p.on{background:var(--ok);border-color:var(--ok);}
.gradc .pip .p.next{border-color:var(--ok);border-style:dashed;}
.gradc .q{font-family:var(--serif);font-size:13px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gradc .kp{font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.04em;margin-top:2px;}
.gradc .go{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-2);font-weight:600;}
.gradc .it:hover .go{color:var(--ok);}

/* 蒙对识破 — diagonal stripes */
.bluff{background:var(--paper-2);border:1px solid var(--rule-strong);}
.bluff .big{font-family:var(--serif);font-weight:600;font-size:42px;line-height:1;color:var(--accent);margin:4px 0 0;letter-spacing:-.02em;}
.bluff .big .u{font-family:var(--mono);font-size:12px;color:var(--ink-3);font-weight:500;margin-left:6px;letter-spacing:.06em;}
.bluff .desc{font-size:12px;line-height:1.55;color:var(--ink-2);}
.bluff .desc b{color:var(--ink);font-weight:600;}
.bluff .ftrow{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:8px;border-top:1px solid var(--rule);}
.bluff .ftrow .ev{font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.06em;}
.bluff .ftrow .ev b{color:var(--ink);font-family:var(--serif);font-size:14px;font-weight:600;}

/* AI weekly */
.aiwk{background:var(--ink);color:var(--paper);position:relative;}
.aiwk::after{content:"";position:absolute;right:-60px;bottom:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(243,238,223,.05) 0,transparent 60%);pointer-events:none;}
.aiwk h4{color:var(--paper);}
.aiwk h4 .sub{color:var(--on-ink-2);}
.aiwk .quote{font-family:var(--sans);font-size:14px;line-height:1.65;color:var(--on-ink);font-weight:400;border-left:2px solid var(--on-ink-2);padding-left:12px;}
.aiwk .insights{display:flex;flex-direction:column;gap:6px;margin-top:4px;}
.aiwk .ins{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;font-family:var(--mono);font-size:11px;color:var(--on-ink-2);letter-spacing:.04em;}
.aiwk .ins .ik{color:var(--on-ink);}
.aiwk .ins .iv{color:var(--on-ink);font-family:var(--serif);font-size:14px;font-weight:600;}
.aiwk .more{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--on-ink);letter-spacing:.12em;text-transform:uppercase;border-bottom:1px solid var(--on-ink-2);padding-bottom:4px;width:fit-content;cursor:pointer;}
.aiwk .more:hover{color:var(--on-ink);border-color:var(--on-ink);}

/* ring goal */
.goal{background:var(--paper);border:1px solid var(--rule);padding:20px 22px;display:flex;flex-direction:column;gap:14px;}
.goal h4{font-family:var(--serif);font-size:16px;font-weight:600;margin:0;display:flex;justify-content:space-between;align-items:baseline;}
.goal h4 .sub{font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase;font-weight:400;}
.goal .rrow{display:flex;gap:18px;align-items:center;}
.ring{width:84px;height:84px;position:relative;flex:none;}
.ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.ring .c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring .c .n{font-family:var(--serif);font-weight:600;font-size:22px;line-height:1;}
.ring .c .o{font-family:var(--mono);font-size:10px;color:var(--ink-3);margin-top:2px;letter-spacing:.08em;}
.goal .lg{display:flex;flex-direction:column;gap:8px;flex:1;}
.goal .lg .li{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--ink-2);letter-spacing:.04em;}
.goal .lg .li b{color:var(--ink);font-weight:600;font-family:var(--serif);font-size:14px;}
.goal .cta{display:inline-flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--paper-2);border:1px solid var(--rule);font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);cursor:pointer;}
.goal .cta:hover{background:var(--ink);color:var(--paper);border-color:var(--ink);}

/* filters reused */
.filters{background:var(--paper);border:1px solid var(--rule);margin-bottom:24px;}
.fr{display:grid;grid-template-columns:96px 1fr;gap:16px;padding:14px 24px;border-bottom:1px solid var(--rule);align-items:center;}
.fr:last-of-type{border-bottom:0;}
.fr .k{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);}
.fchip{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 12px;border:1px solid transparent;border-radius:4px;font-size:13px;color:var(--ink-2);transition:all 120ms ease;cursor:pointer;}
.fchip:hover{background:var(--paper-2);}
.fchip.active{background:var(--ink);color:var(--paper);}
.fchip .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);}
.fchip .badge{font-family:var(--mono);font-size:10px;opacity:.55;margin-left:2px;}
.fcs{display:flex;flex-wrap:wrap;gap:6px;}
.ff{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:var(--paper-2);border-top:1px solid var(--rule);}
.fs{display:flex;flex-wrap:wrap;gap:10px;align-items:center;color:var(--ink-3);font-size:13px;}
.st-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--paper);border:1px solid var(--rule);font-family:var(--mono);font-size:11px;color:var(--ink-2);letter-spacing:.06em;}
.match{font-family:var(--serif);font-weight:600;font-size:18px;color:var(--ink);margin-left:4px;}
.reset{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);text-decoration:underline;cursor:pointer;}

/* list */
.list{background:var(--paper);border:1px solid var(--rule);}
.row{display:grid;grid-template-columns:8px 56px 1fr 180px 170px 110px;gap:24px;padding:22px 26px 22px 0;border-bottom:1px solid var(--rule);align-items:center;position:relative;transition:background 120ms ease;}
.row:last-child{border-bottom:0;}
.row:hover{background:var(--paper-2);}
.row .sev{align-self:stretch;background:var(--rule);}
.row[data-sev="high"] .sev{background:var(--accent);}
.row[data-sev="mid"]  .sev{background:var(--warn);}
.row[data-sev="low"]  .sev{background:var(--ink-4);}
.row[data-sev="ok"]   .sev{background:var(--ok);}
.row .idx{font-family:var(--serif);font-weight:500;font-size:30px;color:var(--ink-4);line-height:1;text-align:center;}
.row:hover .idx{color:var(--ink);}
.body .top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.body .pill{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;border:1px solid var(--rule);padding:2px 6px;color:var(--ink-2);}
.body .kp{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.04em;}
.body .rep{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:var(--err-bg);color:var(--err);padding:2px 6px;font-weight:600;}
.body .danger{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:var(--accent);color:var(--paper);padding:2px 6px;font-weight:600;}
.body .q{font-family:var(--serif);font-size:15px;line-height:1.5;color:var(--ink);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.body .tr{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.body .why{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;border:1px dashed var(--rule-strong);color:var(--ink-2);}
.body .why.ok{border-color:var(--ok);color:var(--ok);}
.metr{display:flex;flex-direction:column;gap:4px;}
.metr .lb{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;}
.metr .lns{display:flex;gap:12px;align-items:baseline;}
.metr .v{font-family:var(--serif);font-weight:600;font-size:22px;color:var(--ink);}
.metr .v.bad{color:var(--accent);}
.metr .u{font-family:var(--mono);font-size:11px;color:var(--ink-3);}
.metr .ans{display:inline-block;width:24px;height:24px;border:1px solid var(--rule);text-align:center;line-height:22px;font-family:var(--mono);font-size:12px;color:var(--ink-3);}
.metr .ans.wrong{border-color:var(--ink-2);color:var(--ink-2);}
.metr .ans.right{border-color:var(--ok);color:var(--ok);background:var(--ok-bg);}
.mast{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.06em;}
.mast .dots{display:inline-flex;gap:3px;vertical-align:middle;margin-right:6px;}
.mast .d{width:6px;height:6px;border:1px solid var(--rule-strong);border-radius:50%;}
.mast .d.on{background:var(--ink);border-color:var(--ink);}
