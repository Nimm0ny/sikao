<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>思考 · 登录 · v4 移动优先</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<link rel="stylesheet" href="../../tokens.css">
<style>
  /* ── v4 mobile-first ── 360px 单列 + 48px touch + sticky bottom CTA ── */

  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--sans);
    font-size: var(--fs-base);
    color: var(--ink);
    background: var(--bg);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-wrap: pretty;
  }

  /* ── Tabs (top, design canvas review only) ─────────────────────── */
  .tabs {
    position: sticky; top: 0; z-index: 100;
    background: rgb(255 255 255 / .85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    display: flex; gap: 4px; padding: 12px 16px;
    font-size: var(--fs-sm);
  }
  .tabs button {
    appearance: none; background: transparent; border: 0; cursor: pointer;
    padding: 8px 12px; border-radius: var(--r-btn);
    font-family: inherit; font-size: inherit; color: var(--muted);
    font-weight: 500;
    transition: all var(--motion-fast) var(--motion-ease);
  }
  .tabs button:hover { color: var(--ink); background: var(--bg-alt); }
  .tabs button.active {
    color: var(--ink); background: var(--bg);
    box-shadow: 0 0 0 1px var(--line);
  }
  .tabs .label {
    margin-left: auto; font-size: var(--fs-xs); color: var(--muted);
    align-self: center; letter-spacing: .04em;
  }

  /* ── Mobile shell ───────────────────────────────────────────────── */
  .page {
    background: var(--bg-alt);
    min-height: calc(100vh - 56px);
    padding: 32px 16px;
  }

  /* Phone-shaped wrapper to convey mobile-first intent on desktop */
  .phone {
    max-width: 360px; margin: 0 auto;
    background: var(--bg);
    border-radius: 28px;
    border: 1px solid var(--line);
    box-shadow:
      0 1px 1px rgb(15 23 42 / .04),
      0 12px 32px -8px rgb(15 23 42 / .12);
    overflow: hidden;
    position: relative;
    min-height: 640px;
    display: flex; flex-direction: column;
  }
  /* Mock status bar (subtle) */
  .phone::before {
    content: ""; height: 24px;
    background: var(--bg-alt);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }

  .view { display: none; flex: 1; flex-direction: column; }
  .view.active { display: flex; }

  /* ── Top bar (in-app nav) ───────────────────────────────────────── */
  .topbar {
    height: 52px;
    display: flex; align-items: center; gap: 10px;
    padding: 0 18px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .topbar .back {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); cursor: pointer;
    border-radius: var(--r-sm);
    transition: all var(--motion-fast) var(--motion-ease);
    text-decoration: none; font-size: 18px;
  }
  .topbar .back:hover { background: var(--bg-alt); color: var(--ink); }
  .topbar .crumb {
    font-size: var(--fs-base); font-weight: 500; color: var(--ink);
  }

  /* ── Body content ───────────────────────────────────────────────── */
  .body {
    flex: 1;
    padding: 28px 20px 16px;
    display: flex; flex-direction: column;
    overflow-y: auto;
  }

  .brand-mark {
    margin: 4px 0 28px;
    text-align: center;
  }
  .brand-mark .glyph {
    width: 56px; height: 56px;
    background: var(--ink); color: var(--bg);
    border-radius: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 26px; letter-spacing: -.02em;
    margin-bottom: 14px;
  }
  .brand-mark .name {
    font-size: var(--fs-lg); font-weight: 600; color: var(--ink);
    letter-spacing: -.01em; display: block;
  }
  .brand-mark .tagline {
    font-size: var(--fs-sm); color: var(--muted);
    margin-top: 6px;
  }

  h1.title {
    margin: 0 0 6px; font-size: var(--fs-xl);
    font-weight: 600; letter-spacing: -.01em;
    color: var(--ink); line-height: 1.3;
  }
  p.sub {
    margin: 0 0 24px; color: var(--muted);
    font-size: var(--fs-sm);
  }

  /* ── Form (large touch targets) ─────────────────────────────────── */
  .field { margin-bottom: 14px; }
  .field label {
    display: block; margin-bottom: 6px;
    font-size: var(--fs-sm); font-weight: 500; color: var(--ink);
  }
  .field input {
    width: 100%; height: 48px; padding: 0 14px;
    font-family: inherit; font-size: var(--fs-md);
    color: var(--ink); background: var(--bg);
    border: 1px solid var(--line-strong); border-radius: var(--r-md);
    outline: none; transition: all var(--motion-fast) var(--motion-ease);
  }
  .field input::placeholder { color: var(--placeholder); }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgb(63 126 241 / .15);
  }
  .field .help {
    margin-top: 6px; font-size: var(--fs-xs); color: var(--muted);
    line-height: 1.5;
  }

  .field-row { display: flex; gap: 10px; }
  .field-row > .field { flex: 1; margin-bottom: 0; }

  /* ── Sticky bottom CTA ──────────────────────────────────────────── */
  .footer {
    border-top: 1px solid var(--line);
    padding: 14px 20px 20px;
    background: var(--bg);
    flex-shrink: 0;
  }
  .btn {
    width: 100%; height: 50px;
    font-family: inherit; font-size: var(--fs-md); font-weight: 600;
    border-radius: var(--r-btn); border: 1px solid transparent;
    cursor: pointer;
    transition: all var(--motion-fast) var(--motion-ease);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .btn.primary {
    background: var(--ink); color: #fff;
  }
  .btn.primary:hover { background: #1e293b; }
  .btn.primary:active { transform: scale(.98); }
  .btn.send-code {
    width: auto; flex: 0 0 auto; height: 48px;
    padding: 0 14px; font-size: var(--fs-sm);
    background: var(--bg); color: var(--ink);
    border-color: var(--line-strong);
  }
  .btn.send-code:hover { background: var(--bg-alt); }

  .footer .switch-row {
    margin-top: 12px; text-align: center;
    font-size: var(--fs-sm); color: var(--muted);
  }
  .link { color: var(--accent); text-decoration: none; font-weight: 500; }
  .link:hover { text-decoration: underline; text-underline-offset: 2px; }

  .auxrow {
    margin-top: 12px;
    text-align: right;
    font-size: var(--fs-sm); color: var(--muted);
  }

  /* ── Forgot success ─────────────────────────────────────────────── */
  .success-state {
    flex: 1;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center;
    padding: 48px 20px;
  }
  .success-bullet {
    width: 64px; height: 64px;
    background: var(--success-bg); color: var(--success);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 22px;
    font-size: 28px; font-weight: 700;
  }

  .footer-text {
    margin-top: 18px;
    font-size: var(--fs-xs); color: var(--muted);
    text-align: center; line-height: 1.6;
  }

  /* Scale up phone slightly on bigger screens for visibility */
  @media (min-width: 768px) {
    .phone { max-width: 400px; min-height: 720px; }
  }
  @media (max-width: 480px) {
    .page { padding: 0; background: var(--bg); }
    .phone {
      max-width: 100%; min-height: calc(100vh - 56px);
      border: 0; border-radius: 0; box-shadow: none;
    }
    .phone::before { display: none; }
    .tabs { padding: 8px 12px; flex-wrap: wrap; }
    .tabs .label { display: none; }
  }
</style>
</head>
<body>

<nav class="tabs" role="tablist" aria-label="View switcher">
  <button data-view="login" class="active">登录</button>
  <button data-view="register-email">邮箱注册</button>
  <button data-view="register-phone">手机注册</button>
  <button data-view="forgot">找回密码</button>
  <span class="label">v4 · 移动优先</span>
</nav>

<main class="page">
  <div class="phone">

    <!-- ── 1. Login ─────────────────────────────────────────── -->
    <section class="view active" id="login">
      <div class="topbar">
        <span class="crumb" style="margin: 0 auto;">登录</span>
      </div>
      <div class="body">
        <div class="brand-mark">
          <div class="glyph">思</div>
          <span class="name">思考</span>
          <div class="tagline">让备考从刷题变成思考</div>
        </div>

        <h1 class="title">欢迎回来</h1>
        <p class="sub">登录后继续你的备考。</p>

        <form id="login-form" onsubmit="event.preventDefault()">
          <div class="field">
            <label for="login-id">账号</label>
            <input id="login-id" type="text" autocomplete="username"
              placeholder="邮箱、手机号或用户名" inputmode="email">
          </div>
          <div class="field" style="margin-bottom:0;">
            <label for="login-pw">密码</label>
            <input id="login-pw" type="password" autocomplete="current-password"
              placeholder="输入密码">
          </div>
          <div class="auxrow">
            <a class="link" href="#forgot" onclick="show('forgot')">忘记密码？</a>
          </div>
        </form>
      </div>
      <div class="footer">
        <button type="submit" form="login-form" class="btn primary">登录</button>
        <div class="switch-row">
          还没账号？
          <a class="link" href="#register-email" onclick="show('register-email')">邮箱</a>
          ·
          <a class="link" href="#register-phone" onclick="show('register-phone')">手机</a>
        </div>
      </div>
    </section>

    <!-- ── 2. Register · Email ──────────────────────────────── -->
    <section class="view" id="register-email">
      <div class="topbar">
        <a class="back" href="#login" onclick="show('login');return false;">←</a>
        <span class="crumb">用邮箱注册</span>
      </div>
      <div class="body">
        <h1 class="title" style="margin-top:8px;">几秒搞定</h1>
        <p class="sub">开始你的备考节奏。</p>

        <form id="reg-email-form" onsubmit="event.preventDefault()">
          <div class="field">
            <label for="reg-email">邮箱</label>
            <input id="reg-email" type="email" autocomplete="email"
              placeholder="email@example.com" inputmode="email">
          </div>
          <div class="field">
            <label for="reg-name">显示名（可选）</label>
            <input id="reg-name" type="text" autocomplete="nickname"
              placeholder="留空自动用邮箱前缀">
          </div>
          <div class="field" style="margin-bottom:0;">
            <label for="reg-pw">密码</label>
            <input id="reg-pw" type="password" autocomplete="new-password"
              placeholder="至少 6 位">
          </div>
        </form>

        <div class="footer-text" style="margin-top:24px;">
          创建账号即视为同意《用户协议》与《隐私政策》。
        </div>
      </div>
      <div class="footer">
        <button type="submit" form="reg-email-form" class="btn primary">创建账号</button>
        <div class="switch-row">
          已有账号？<a class="link" href="#login" onclick="show('login')">登录</a>
        </div>
      </div>
    </section>

    <!-- ── 3. Register · Phone ──────────────────────────────── -->
    <section class="view" id="register-phone">
      <div class="topbar">
        <a class="back" href="#login" onclick="show('login');return false;">←</a>
        <span class="crumb">用手机注册</span>
      </div>
      <div class="body">
        <h1 class="title" style="margin-top:8px;">用手机注册</h1>
        <p class="sub">中国大陆手机号，发码 10 分钟有效。</p>

        <form id="reg-phone-form" onsubmit="event.preventDefault()">
          <div class="field">
            <label for="reg-phone">手机号</label>
            <input id="reg-phone" type="tel" autocomplete="tel"
              placeholder="138 0013 8000" inputmode="numeric" maxlength="13">
          </div>

          <div class="field">
            <label for="reg-code">验证码</label>
            <div class="field-row">
              <div class="field" style="flex:1;">
                <input id="reg-code" type="text" autocomplete="one-time-code"
                  placeholder="6 位" inputmode="numeric" maxlength="6">
              </div>
              <button type="button" class="btn send-code">发送</button>
            </div>
            <div class="help">未收到？60 秒后可重发。</div>
          </div>

          <div class="field" style="margin-bottom:0;">
            <label for="reg-phone-pw">设置密码</label>
            <input id="reg-phone-pw" type="password" autocomplete="new-password"
              placeholder="至少 6 位">
          </div>
        </form>
      </div>
      <div class="footer">
        <button type="submit" form="reg-phone-form" class="btn primary">完成注册</button>
        <div class="switch-row">
          已有账号？<a class="link" href="#login" onclick="show('login')">登录</a>
        </div>
      </div>
    </section>

    <!-- ── 4. Forgot ─────────────────────────────────────────── -->
    <section class="view" id="forgot">
      <div class="topbar">
        <a class="back" href="#login" onclick="show('login');return false;">←</a>
        <span class="crumb">找回密码</span>
      </div>

      <!-- 表单态 (默认) -->
      <div class="body" id="forgot-form-state">
        <h1 class="title" style="margin-top:8px;">找回密码</h1>
        <p class="sub">输入注册邮箱，我们发重置链接给你。</p>

        <form id="forgot-form" onsubmit="event.preventDefault();
          document.getElementById('forgot-form-state').style.display='none';
          document.getElementById('forgot-form-footer').style.display='none';
          document.getElementById('forgot-success').style.display='flex';">
          <div class="field" style="margin-bottom:0;">
            <label for="forgot-id">邮箱</label>
            <input id="forgot-id" type="email" autocomplete="email"
              placeholder="email@example.com" inputmode="email">
            <div class="help">链接 1 小时内有效。</div>
          </div>
        </form>
      </div>
      <div class="footer" id="forgot-form-footer">
        <button type="submit" form="forgot-form" class="btn primary">发送重置链接</button>
        <div class="switch-row">
          想起来了？<a class="link" href="#login" onclick="show('login')">回登录</a>
        </div>
      </div>

      <!-- 成功态 (默认 hidden) -->
      <div class="success-state" id="forgot-success" style="display:none;">
        <div class="success-bullet">✓</div>
        <h1 class="title">已发送</h1>
        <p class="sub" style="max-width:280px;">
          如果邮箱已注册，几分钟内会收到重置链接。<br>
          没收到？检查垃圾邮箱。
        </p>
        <a class="link" href="#login" onclick="show('login')"
           style="margin-top:24px; padding:12px 24px;">回登录</a>
      </div>
    </section>

  </div>
</main>

<script>
  function show(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    document.querySelector(`.tabs button[data-view="${name}"]`).classList.add('active');
    if (history.replaceState) history.replaceState(null, '', '#' + name);
    window.scrollTo({ top: 0, behavior: 'instant' });
    // Reset forgot success state when navigating away
    if (name !== 'forgot') {
      const ff = document.getElementById('forgot-form-state');
      const ft = document.getElementById('forgot-form-footer');
      const fs = document.getElementById('forgot-success');
      if (ff && ft && fs) {
        ff.style.display = 'flex'; ft.style.display = 'block'; fs.style.display = 'none';
      }
    }
  }
  document.querySelectorAll('.tabs button').forEach(b =>
    b.addEventListener('click', () => show(b.dataset.view))
  );
  const initial = location.hash.slice(1);
  if (['login','register-email','register-phone','forgot'].includes(initial)) show(initial);
</script>

</body>
</html>
