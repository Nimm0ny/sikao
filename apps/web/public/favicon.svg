<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Favicon — design SSOT 来自 element/preview/logo.html "Favicon 32px" 块.
       结构: ink 黑底圆角 + 白色"田"字 (6 条 stroke line) + 白色一个实心圆点
       (在"田"下方位置, 抽象"心"字底). 不要再加两条心弧 wave (那是 phase 5
       自创的 abstract heart 已被否决). -->
  <rect width="40" height="40" rx="10" fill="#0b1120"/>
  <g stroke="#ffffff" stroke-width="1.8" stroke-linecap="round">
    <line x1="11" y1="13" x2="29" y2="13"/>
    <line x1="11" y1="22" x2="29" y2="22"/>
    <line x1="11" y1="13" x2="11" y2="27"/>
    <line x1="20" y1="13" x2="20" y2="27"/>
    <line x1="29" y1="13" x2="29" y2="27"/>
    <line x1="11" y1="27" x2="29" y2="27"/>
  </g>
  <circle cx="20" cy="34" r="2.2" fill="#ffffff"/>
</svg>
